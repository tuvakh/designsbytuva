        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const menuToggle = document.querySelector('.navbar__menu');
                const menu = document.querySelector('.navbar__list');

                // Toggle menu on click
                menuToggle.addEventListener('click', () => {
                    const isOpen = menu.classList.toggle('open');
                    menuToggle.setAttribute('aria-expanded', isOpen);
                });

                // Close menu when clicking a link
                menu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        menu.classList.remove('open');
                    });
                });

                // Toggle menu on keyboard (Enter or Space)
                menuToggle.addEventListener('keypress', (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        const isOpen = menu.classList.toggle('open');
                        menuToggle.setAttribute('aria-expanded', isOpen);
                    }
                });
            });
    </script>
    <style>
/* @keyframes twinkle {
    from { opacity: 0.5; transform: scale(1); }
    to { opacity: 1; transform: scale(3); }
} */
        .star {
    width: 50px;   /* juster etter behov */
    height: 50px;
    animation: twinkle 2s infinite alternate;
}

         <script>
            const container = document.getElementById('main');

const starPositions = [
  {x: 150, y: 100},
  {x: 200, y: 150},
  {x: 300, y: 200},
  {x: 400, y: 250},,
  {x: 500, y: 300},
  {x: 620, y: 350},
  // flere
];

starPositions.forEach(pos => {
  const star = document.createElement('img');
  star.src = 'images/stars.svg';
  star.classList.add('star');

  // tilfeldig størrelse
  const size = 5 + Math.random() * 15;
  star.style.width = `${size}px`;
  star.style.height = `${size}px`;

  star.style.position = 'absolute';
  star.style.left = `${pos.x}px`;
  star.style.top = `${pos.y}px`;

  // tilfeldig: 50% blinker
  if (Math.random() < 0.5) star.classList.add('twinkle');

  // tilfeldig blinketid og delay
  if (star.classList.contains('twinkle')) {
    star.style.animationDuration = `${1 + Math.random() * 2}s`;
    star.style.animationDelay = `${Math.random() * 2}s`;
  }

  container.appendChild(star);
});
        </script>
    </body>
